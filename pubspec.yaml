name: estudio_app
description: "App educativa para estudiar con preguntas y respuestas"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  change_app_package_name: ^1.5.0
  share_plus: ^12.0.2
  cloud_firestore: ^6.2.0
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  google_sign_in: ^6.2.2
  firebase_app_check: ^0.4.2
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.2.1
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  http: ^1.2.2          # llamadas REST a Groq y Gemini
  image_picker: ^1.1.2  # seleccionar imagen de galería o cámara

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/login_bg.jpg
    - .env
    - assets/icons/